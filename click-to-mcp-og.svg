<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0b"/>
      <stop offset="100%" style="stop-color:#1a1a2e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#a78bfa"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Terminal frame -->
  <rect x="80" y="80" width="500" height="380" rx="12" fill="#121213" stroke="#2a2a2d" stroke-width="2"/>
  <!-- Terminal dots -->
  <circle cx="105" cy="105" r="8" fill="#ff5f57"/>
  <circle cx="130" cy="105" r="8" fill="#ffbd2e"/>
  <circle cx="155" cy="105" r="8" fill="#28c840"/>
  <!-- Terminal lines -->
  <text x="105" y="145" font-family="Consolas, monospace" font-size="16" fill="#34d399">$ pip install click-to-mcp</text>
  <text x="105" y="175" font-family="Consolas, monospace" font-size="16" fill="#e1e1e3">Installing...</text>
  <text x="105" y="205" font-family="Consolas, monospace" font-size="16" fill="#34d399">$ click-to-mcp discover</text>
  <text x="105" y="235" font-family="Consolas, monospace" font-size="16" fill="#e1e1e3">Found 12 Click CLIs in your environment</text>
  <text x="105" y="265" font-family="Consolas, monospace" font-size="16" fill="#34d399">$ click-to-mcp serve api-contract-guardian</text>
  <text x="105" y="295" font-family="Consolas, monospace" font-size="16" fill="#a78bfa">MCP server running on stdio...</text>
  <text x="105" y="325" font-family="Consolas, monospace" font-size="16" fill="#6366f1">► Connected to Claude Desktop</text>
  <text x="105" y="355" font-family="Consolas, monospace" font-size="16" fill="#34d399">Ready to accept MCP requests ✓</text>

  <!-- MCP icon -->
  <rect x="680" y="100" width="440" height="120" rx="60" fill="none" stroke="url(#accent)" stroke-width="3"/>
  <text x="900" y="160" font-family="Arial, sans-serif" font-size="28" fill="#e1e1e3" text-anchor="middle" font-weight="700">MCP</text>
  <text x="900" y="192" font-family="Arial, sans-serif" font-size="14" fill="#888" text-anchor="middle">Model Context Protocol</text>

  <!-- Arrow -->
  <text x="900" y="280" font-family="Arial, sans-serif" font-size="48" fill="#6366f1" text-anchor="middle">→</text>

  <!-- CLI icon -->
  <rect x="680" y="310" width="440" height="120" rx="60" fill="none" stroke="#34d399" stroke-width="3"/>
  <text x="900" y="370" font-family="Arial, sans-serif" font-size="28" fill="#e1e1e3" text-anchor="middle" font-weight="700">CLI</text>
  <text x="900" y="402" font-family="Arial, sans-serif" font-size="14" fill="#888" text-anchor="middle">Any Click / Typer CLI</text>

  <!-- Footer -->
  <text x="900" y="520" font-family="Arial, sans-serif" font-size="32" fill="#fff" text-anchor="middle" font-weight="800">click-to-mcp</text>
  <text x="900" y="550" font-family="Arial, sans-serif" font-size="16" fill="#888" text-anchor="middle">Auto-wrap any CLI as an MCP server — zero code</text>

  <!-- Bottom bar -->
  <rect x="80" y="580" width="1040" height="2" fill="url(#accent)" rx="1"/>
</svg>
